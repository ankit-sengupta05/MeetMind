# =============================================================================
# .github/workflows/deploy.yml
# CI/CD pipeline — runs on push to main
# =============================================================================

name: MeetMind CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: meetmind-api-prod

jobs:
  # ─── 1. Build & Test ────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check all workspaces
        run: npm run typecheck

      - name: Lint all workspaces
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Build all workspaces
        run: npm run build

      - name: Upload server build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/
          retention-days: 1

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 1

  # ─── 2. Deploy to Azure App Service ─────────────────────────────────────────
  deploy-server:
    name: Deploy API Server
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && secrets.AZURE_CREDENTIALS != ''
    environment:
      name: production
      url: https://meetmind-api-prod.azurewebsites.net

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download server build artifact
        uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: server/dist/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: server/

  # ─── 3. Deploy Azure Functions ──────────────────────────────────────────────
  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && secrets.AZURE_CREDENTIALS != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install & build functions
        run: |
          npm ci
          npm run build:functions

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: meetmind-functions-prod
          package: functions/
          respect-funcignore: true

  # ─── 4. Teams App Update (optional) ─────────────────────────────────────────
  # Uncomment when you have a Teams App catalog ID to auto-update the manifest
  # deploy-teams-app:
  #   name: Update Teams App Manifest
  #   ...
