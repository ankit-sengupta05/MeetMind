name: MeetMind CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  # ============================================================
  # Lint, type-check, and test all workspaces
  # ============================================================
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace (required by all others)
        run: npm run build --workspace=shared

      - name: Type-check all workspaces
        run: npm run typecheck --workspaces --if-present

      - name: Lint all workspaces
        run: npm run lint --workspaces --if-present

      - name: Run tests
        run: npm run test --workspaces --if-present

  # ============================================================
  # Build client for deployment verification
  # ============================================================
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Build client
        env:
          VITE_AZURE_AD_CLIENT_ID: ${{ secrets.VITE_AZURE_AD_CLIENT_ID }}
          VITE_AZURE_AD_TENANT_ID: ${{ secrets.VITE_AZURE_AD_TENANT_ID }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build --workspace=client

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

  # ============================================================
  # Build server
  # ============================================================
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Build server
        run: npm run build --workspace=server

  # ============================================================
  # Security scan — check for secrets in source
  # ============================================================
  security:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for raw secrets in source files
        run: |
          if grep -rE \
            "(API_KEY|SECRET_KEY|PRIVATE_KEY|PASSWORD|AUTH_TOKEN|CLIENT_SECRET)=[^*\$\{[:space:]][^\n]{5,}" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist .; then
            echo "❌ Possible raw secrets detected!"
            exit 1
          else
            echo "✅ No raw secrets found in source files."
          fi

  # ============================================================
  # Deploy to Azure App Service (main branch only)
  # ============================================================
  deploy-server:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    needs: [build-server, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE != ''
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build --workspace=shared
          npm run build --workspace=server

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: meetmind-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./server
